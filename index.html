<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f1ea" />
    <title>My Diary</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="rail">
        <div class="brand">
          <div class="brand-icon">日</div>
          <div>
            <h1>My Diary</h1>
            <p>把生活先放进来</p>
          </div>
        </div>

        <nav class="tabs" aria-label="主导航">
          <button class="tab active" data-view="today" type="button">今日</button>
          <button class="tab" data-view="timeline" type="button">时间线</button>
          <button class="tab" data-view="tasks" type="button">任务</button>
          <button class="tab" data-view="mood" type="button">心情</button>
          <button class="tab" data-view="money" type="button">收支</button>
          <button class="tab" data-view="photos" type="button">相册</button>
        </nav>

        <section class="side-card">
          <div class="status-line">
            <span>本地数据库</span>
            <strong id="dbStatus">启动中</strong>
          </div>
          <div class="status-line">
            <span>记录数</span>
            <strong id="entryCount">0</strong>
          </div>
          <div class="side-actions">
            <button id="exportBtn" type="button">导出</button>
            <button id="importBtn" type="button">导入</button>
            <input id="importFile" type="file" accept="application/json" hidden />
          </div>
        </section>
      </aside>

      <main class="main">
        <header class="top">
          <div>
            <p id="todayLabel" class="subtle"></p>
            <h2 id="viewTitle">今日</h2>
          </div>
          <button id="saveBtn" class="primary" type="button">保存记录</button>
        </header>

        <section class="capture">
          <textarea
            id="textInput"
            placeholder="随便写，不用分类。比如：今天下午很累，星巴克花了39，明天10点给客户打电话。"
          ></textarea>

          <div class="capture-grid">
            <label>
              心情
              <select id="moodInput">
                <option value="">自动判断</option>
                <option value="开心">开心</option>
                <option value="平静">平静</option>
                <option value="疲惫">疲惫</option>
                <option value="焦虑">焦虑</option>
                <option value="低落">低落</option>
                <option value="生气">生气</option>
              </select>
            </label>
            <label>
              标签
              <input id="tagInput" placeholder="工作, 学习, 家人" />
            </label>
            <label class="photo-picker">
              图片
              <input id="photoInput" type="file" accept="image/*" multiple />
            </label>
          </div>

          <div id="preview" class="preview"></div>
          <p id="saveHint" class="save-hint">数据只保存在当前浏览器。重要内容请定期导出备份。</p>
        </section>

        <section id="dashboard" class="dashboard"></section>

        <section class="toolbar">
          <input id="searchInput" placeholder="搜索记录、标签、任务、账单" />
          <select id="filterInput">
            <option value="all">全部</option>
            <option value="diary">日记</option>
            <option value="task">任务</option>
            <option value="money">收支</option>
            <option value="mood">心情</option>
            <option value="photo">图片</option>
          </select>
        </section>

        <section id="content" class="content"></section>
      </main>
    </div>

    <template id="entryTpl">
      <article class="entry">
        <div class="entry-head">
          <div>
            <time></time>
            <div class="chips"></div>
          </div>
          <button class="ghost danger" type="button">删除</button>
        </div>
        <p class="entry-text"></p>
        <div class="photo-row"></div>
        <div class="facts"></div>
      </article>
    </template>

    <script src="app.js" type="module"></script>
  </body>
</html>
